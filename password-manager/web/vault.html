<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🔐 PassVault</div>
  <div class="nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/vault">Vault</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="main">

  <h2>Vault</h2>

  <!-- SEARCH -->
  <input class="search" id="search" placeholder="Search websites...">

  <!-- ADD PASSWORD -->
  <div class="card">
    <h3>Add Password</h3>
    <form action="/addPassword" method="post">
      <input name="website" placeholder="Website" required>
      <input name="username" placeholder="Username" required>
      <input name="password" placeholder="Password" required>
      <button type="submit">Save</button>
    </form>
  </div>

  <!-- TABLE -->
  <div class="card">
    <table id="table">
      <tr>
        <th>Website</th>
        <th>Username</th>
        <th>Password</th>
        <th>Strength</th>
        <th>Action</th>
      </tr>

      {{ROWS}}

    </table>
  </div>

</div>

<script>
// 🔍 SEARCH
document.getElementById("search").addEventListener("keyup", function() {
  let val = this.value.toLowerCase();
  let rows = document.querySelectorAll("#table tr");

  rows.forEach((row, i) => {
    if (i === 0) return;
    row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
  });
});

// 🔓 REVEAL PASSWORD (correct version)
function reveal(btn, enc) {
  fetch("/reveal?data=" + encodeURIComponent(enc))
    .then(res => res.text())
    .then(pass => {
      // move from button -> td -> previous td (strength) -> previous td (password)
      let passwordCell = btn.parentElement.previousElementSibling.previousElementSibling;
      passwordCell.innerText = pass;
      passwordCell.classList.remove("password");
    })
    .catch(() => alert("Failed to reveal password"));
}
</script>

</body>
</html>
