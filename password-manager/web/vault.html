<!DOCTYPE html>
<html>
<head>
  <title>Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">🔐 PassVault</div>
  <div class="nav">
    <a href="/">Login</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/vault">Vault</a>
  </div>
</div>

<div class="main">

  <h2>Vault</h2>
  <p>Store and manage your credentials</p>

  <!-- ADD PASSWORD -->
  <div class="card" style="margin-bottom:30px;">
    <h3>Add New Password</h3>

    <form action="/addPassword" method="post">
      <input name="website" placeholder="Website" required>
      <input name="username" placeholder="Username" required>
      <input name="password" placeholder="Password" required>
      <button type="submit">Save Password</button>
    </form>
  </div>

  <!-- PASSWORD TABLE -->
  <div class="card">
    <h3>Your Stored Passwords</h3>

    <table>
      <tr>
        <th>Website</th>
        <th>Username</th>
        <th>Strength</th>
        <th>Action</th>
      </tr>

      {{ROWS}}

    </table>
  </div>

</div>

<!-- 🔥 REVEAL SCRIPT -->
<script>
function reveal(enc) {
  fetch("/reveal?data=" + encodeURIComponent(enc))
    .then(res => res.text())
    .then(data => {
      alert("Password: " + data);
    });
}
</script>

</body>
</html>
